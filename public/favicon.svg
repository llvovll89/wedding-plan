<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- 왼쪽 반지가 오른쪽 반지 앞에 오도록 마스크 -->
    <mask id="ringMask">
      <rect width="32" height="32" fill="white"/>
      <!-- 왼쪽 반지 stroke 영역을 검정으로 → 오른쪽 반지의 해당 부분 숨김 -->
      <circle cx="12" cy="16" r="7" fill="none" stroke="black" stroke-width="4.5"/>
    </mask>
  </defs>

  <!-- 오른쪽 반지 (뒤쪽, 마스크 적용) -->
  <circle cx="20" cy="16" r="7" fill="none" stroke="#fb7185" stroke-width="3.2" mask="url(#ringMask)"/>

  <!-- 왼쪽 반지 (앞쪽) -->
  <circle cx="12" cy="16" r="7" fill="none" stroke="#f43f5e" stroke-width="3.2"/>
</svg>
